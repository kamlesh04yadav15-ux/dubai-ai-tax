<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Free Zone Tax</title>

  <link rel="stylesheet" href="freezone.css">

</head>

<body>

  <div class="container">

    <h1>Free Zone Tax Checker</h1>

    <select id="incomeType">

      <option value="qualifying">
        Qualifying Income
      </option>

      <option value="nonqualifying">
        Non Qualifying Income
      </option>

    </select>

    <input
      type="number"
      id="income"
      placeholder="Enter Income"
    >

    <button onclick="checkFreeZoneTax()">
      Check Tax
    </button>

    <h2 id="result"></h2>

  </div>

  <script src="freezone.js"></script>

</body>
</html>
